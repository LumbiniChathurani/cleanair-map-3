<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Lanka Air Quality Widget</title>
  <style>
    :root {
      --ink: #101F26;
      --muted: #5C6E75;
      --faint: #9AA8AE;
      --hairline: #E1E7EA;
      --card-bg: #F1F5F9;
      --card-bg-alt: #DEDAE2;
      --box-bg: #FFFFFF;
      --brand: #17677F;
      --brand-soft: #E4EEF1;
      --brand-hover: #114F62;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .widget-card {
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 180px;
      padding: 0;

      border: 1px solid var(--hairline);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.05), 0 8px 24px rgba(16, 31, 38, 0.07);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
      padding: 14px 22px 16px;

      /* Forest watercolor background image with a very light lemon
         yellow translucent filter on top. */
      background-image:
        linear-gradient(178deg, rgba(255, 250, 205, 0.35) 0%, rgba(255, 245, 170, 0.35) 100%),
        url('forest-bg.png');
      background-size: cover, cover;
      background-position: center, center bottom;
      background-repeat: no-repeat, no-repeat;
    }

    .widget-card::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        to right,
        #009966, #ffde33, #ff9933, #cc0033, #660099
      );
      opacity: 0.9;
      z-index: 2;
    }

    .widget-card:hover {
      box-shadow: 0 3px 8px rgba(16, 31, 38, 0.08), 0 16px 34px rgba(16, 31, 38, 0.12);
      transform: translateY(-1px);
    }

    .header-row {
      background-color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 22px;
      border-radius: 16px 16px 0 0;
      position: sticky;
      top: 0;
      z-index: 3;
      flex-shrink: 0;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .brand-icon {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 11px;
      height: 11px;
    }

    .eyebrow {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      white-space: nowrap;
    }
    .eyebrow1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }
    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand);
      margin-left: 6px;
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    @media (prefers-reduced-motion: no-preference) {
      .live-dot {
        animation: pulse 2.4s ease-in-out infinite;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-caption {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--faint);
      white-space: nowrap;
    }

    /* --------------------------------------------------------
       STATS GRID — each stat is now its own lighter (white)
       box sitting on the slightly darker card background, so
       the three readings read as distinct panels.
       -------------------------------------------------------- */
    .stats-grid {
      display: flex;
      align-items: stretch;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .stat-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.04);
      backdrop-filter: blur(2px);
    }

    .stat-block-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stat-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      flex: 1;
    }

    .stat-face-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* --------------------------------------------------------
       WEATHER CARD — current-location weather (temp, precip,
       humidity, wind) with a "use precise location" opt-in.
       -------------------------------------------------------- */
    /* Now a 4th column inside .stats-grid, sized like a .stat-block
       (flex: 1, same padding/bg/border), just with weather-specific
       internals swapped in below. */
    .weather-card {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.04);
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 1;
    }

    .weather-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .weather-location {
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .weather-location span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .weather-location svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      color: var(--muted);
    }

    .precise-location-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--brand);
      background: var(--brand-soft);
      border: 1px solid var(--brand);
      border-radius: 999px;
      padding: 0;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .precise-location-btn svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .precise-location-btn:hover {
      background: var(--brand);
      color: #fff;
    }

    .precise-location-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .weather-main-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .weather-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .weather-temp-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .weather-temp {
      font-size: 26px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .unit-toggle {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10.5px;
      color: var(--faint);
    }

    .unit-option {
      cursor: pointer;
    }

    .unit-option.active {
      color: var(--ink);
      font-weight: 700;
    }

    .weather-details {
      font-size: 10.5px;
      color: var(--muted);
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weather-details span {
      display: inline-block;
      margin-right: 6px;
    }

    .stat-label-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .stat-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-value-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .stat-face {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.15);
      display: inline-block;
      vertical-align: middle;
      transition: opacity 0.2s ease;
    }

    .stat-face:empty {
      background: var(--hairline);
      opacity: 0.6;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .stat-unit {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--faint);
      text-transform: uppercase;
    }

    .stat-station {
      font-size: 13px;
      font-weight: 650;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-updated {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-updated svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .stat-station.faded,
    .stat-updated.faded {
      color: var(--faint);
      font-weight: 500;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      /*border-top: 1px solid var(--hairline);*/
      padding-top: 5px;
      position: relative;
      z-index: 1;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--brand);
      white-space: nowrap;
    }

    .cta-arrow {
      transition: transform 0.18s ease;
      display: flex;
      align-items: center;
    }

    .widget-card:hover .cta-arrow {
      transform: translateX(3px);
    }

    .widget-card:hover .cta-button {
      color: var(--brand-hover);
    }

    .widget-card.is-loading .stat-value {
      color: var(--faint);
    }

    @media (max-width: 380px) {
      .stats-grid {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <a id="widgetCard" class="widget-card is-loading" href="dashboard.html" target="_top">

    <div class="header-row">
      <div class="brand-mark">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13c0-5 4-9 9-9s9 4 9 9" stroke="#17677F" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 13c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#17677F" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
            <circle cx="12" cy="13" r="1.6" fill="#17677F"/>
          </svg>
        </span>
        <span class="eyebrow">Sri Lanka Air Quality<span class="live-tag"><span class="live-dot"></span>Live</span></span><br/>
        
      </div>
      <span id="refreshCaption" class="refresh-caption"></span>
    </div>

    <div class="card-body">
    <div style="text-align: center;">
        <span class="eyebrow1">How clean is the air today?</span>
    </div>

    <div class="stats-grid">
      <div class="stat-block">
        <div class="stat-block-row">
          <div class="stat-info">
            <div class="stat-label-row">
              <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 16L9 10L13 14L20 6" stroke="#009966" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 6H15M20 6V11" stroke="#009966" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="stat-label">Cleanest</span>
            </div>
            <div class="stat-value-row">
              <span id="cleanValue" class="stat-value">&ndash;&ndash;</span>

            <span id="cleanStation" class="stat-station faded">Loading&hellip;</span>

          </div>
          <div class="stat-face-wrap">
            <span id="cleanFace" class="stat-face"></span>
          </div>
        </div>
      </div>

      <div class="stat-block">
        <div class="stat-block-row">
          <div class="stat-info">
            <div class="stat-label-row">
              <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 8L9 14L13 10L20 18" stroke="#cc0033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 13V18H15" stroke="#cc0033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="stat-label">Highest</span>
            </div>
            <div class="stat-value-row">
              <span id="highValue" class="stat-value">&ndash;&ndash;</span>
              <span class="stat-unit">AQI</span>
            </div>
            <span id="highStation" class="stat-station faded">Loading&hellip;</span>
            <span id="highUpdated" class="stat-updated"></span>
          </div>
          <div class="stat-face-wrap">
            <span id="highFace" class="stat-face"></span>
          </div>
        </div>
      </div>

      <div class="stat-block">
        <div class="stat-label-row">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8.5" stroke="#17677F" stroke-width="2.2"/>
            <path d="M9 12.3L11 14.3L15.5 9.7" stroke="#17677F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

        <div class="stat-value-row">
          <span id="onlineValue" class="stat-value">&ndash;&ndash;</span>

      <div class="weather-card">

              <circle cx="12" cy="9" r="2.3" stroke="currentColor" stroke-width="2"/>
            </svg>

          </div>
          <button id="preciseLocationBtn" class="precise-location-btn" type="button" title="Use precise location">

    <div class="bottom-row">

        View full dashboard

            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </span>

  <script>
    const STALE_THRESHOLD_HOURS = 24; // matches dashboard.html

    const CLOCK_ICON = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
      <path d="M12 7V12L15.5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    function getAQIColor(aqi) {
      if (aqi === null || aqi === undefined) return "#9AA8AE";
      if (aqi <= 50) return "#009966";
      if (aqi <= 100) return "#ffde33";
      if (aqi <= 150) return "#ff9933";
      if (aqi <= 200) return "#cc0033";
      if (aqi <= 300) return "#660099";
      return "#7e0023";
    }

    // --------------------------------------------------------
    // AQI FACE ICONS — a small round face indicator next to the
    // Cleanest / Highest AQI numbers, matching the standard AQI
    // scale (Good -> Hazardous) with an expression + mask that
    // gets progressively more protective as AQI worsens.
    // --------------------------------------------------------
    const AQI_FACE_CONFIG = [
      { bg: "#009966", stroke: "#101F26", mouth: "smile" },     // 0-50 Good
      { bg: "#ffde33", stroke: "#101F26", mouth: "neutral" },   // 51-100 Moderate
      { bg: "#ff9933", stroke: "#101F26", mouth: "worried" },   // 101-150 Unhealthy for sensitive groups
      { bg: "#cc0033", stroke: "#ffffff", mouth: "mask" },      // 151-200 Unhealthy
      { bg: "#660099", stroke: "#ffffff", mouth: "gasmask" },   // 201-300 Very Unhealthy
      { bg: "#7e0023", stroke: "#ffffff", mouth: "respirator" } // 301+ Hazardous
    ];

    function buildAQIFace(bg, stroke, mouth) {
      let extra = "";

      const worriedBrows = mouth === "worried" || mouth === "mask" || mouth === "gasmask" || mouth === "respirator";
      if (worriedBrows) {
        extra += `<path d="M31 41 Q38 36 45 40" stroke="${stroke}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M55 40 Q62 36 69 41" stroke="${stroke}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
      }

      if (mouth === "gasmask" || mouth === "respirator") {
        extra += `<circle cx="37" cy="49" r="7.5" fill="none" stroke="${stroke}" stroke-width="2.5"/>
          <circle cx="63" cy="49" r="7.5" fill="none" stroke="${stroke}" stroke-width="2.5"/>
          <circle cx="37" cy="49" r="1.8" fill="${stroke}"/>
          <circle cx="63" cy="49" r="1.8" fill="${stroke}"/>`;
      } else {
        extra += `<circle cx="38" cy="47" r="2.4" fill="${stroke}"/>
          <circle cx="62" cy="47" r="2.4" fill="${stroke}"/>`;
      }

      switch (mouth) {
        case "smile":
          extra += `<path d="M38 60 Q50 71 62 60 Q50 65 38 60 Z" fill="${stroke}"/>`;
          break;
        case "neutral":
          extra += `<line x1="40" y1="64" x2="60" y2="64" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`;
          break;
        case "worried":
          extra += `<path d="M40 68 Q50 60 60 68" stroke="${stroke}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
          break;
        case "mask":
          extra += `<path d="M25 57 Q50 48 75 57 L75 67 Q50 78 25 67 Z" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/>
            <line x1="50" y1="57" x2="50" y2="75" stroke="${stroke}" stroke-width="2"/>`;
          break;
        case "gasmask":
          extra += `<path d="M23 55 Q50 46 77 55 L77 73 Q50 83 23 73 Z" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/>
            <circle cx="50" cy="67" r="8" fill="none" stroke="${stroke}" stroke-width="2.5"/>
            <circle cx="50" cy="67" r="3" fill="none" stroke="${stroke}" stroke-width="2"/>`;
          break;
        case "respirator":
          extra += `<path d="M21 53 Q50 44 79 53 L79 75 Q50 85 21 75 Z" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round"/>
            <ellipse cx="50" cy="71" rx="13" ry="6.5" fill="none" stroke="${stroke}" stroke-width="2.5"/>
            <line x1="41" y1="71" x2="59" y2="71" stroke="${stroke}" stroke-width="2"/>`;
          break;
      }

      const head = `<circle cx="50" cy="50" r="30" fill="none" stroke="${stroke}" stroke-width="3"/>
        <path d="M28 40 Q30 21 50 19 Q70 21 72 40" fill="none" stroke="${stroke}" stroke-width="3" stroke-linecap="round"/>`;

      return `<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="50" fill="${bg}"/>
        ${head}
        ${extra}
      </svg>`;
    }

    function getAQIFaceSVG(aqi) {
      if (aqi === null || aqi === undefined) return "";
      let idx;
      if (aqi <= 50) idx = 0;
      else if (aqi <= 100) idx = 1;
      else if (aqi <= 150) idx = 2;
      else if (aqi <= 200) idx = 3;
      else if (aqi <= 300) idx = 4;
      else idx = 5;
      const cfg = AQI_FACE_CONFIG[idx];
      return buildAQIFace(cfg.bg, cfg.stroke, cfg.mouth);
    }

    function isStationStale(st) {
      if (st.aqi === null || st.aqi === undefined) return true;
      if (!st.fetchedAt) return true;
      const fetchedTime = new Date(st.fetchedAt);
      if (isNaN(fetchedTime.getTime())) return true;
      const ageHours = (Date.now() - fetchedTime.getTime()) / (1000 * 60 * 60);
      return ageHours > STALE_THRESHOLD_HOURS;
    }

    // Same dedup logic as dashboard.html — collapses duplicate entries
    // for the same physical station (identical name+coords, different
    // fetchedAt) down to just the freshest reading, so the "online"
    // count here matches what the dashboard reports.
    function dedupeStations(stations) {
      const groups = new Map();

      stations.forEach(st => {
        const hasCoords = st.lat !== undefined && st.lon !== undefined;
        const key = hasCoords
          ? `${st.name}_${st.lat.toFixed(3)}_${st.lon.toFixed(3)}`
          : (st.stationId || `${st.name}_${st.source}`);

        const existing = groups.get(key);
        if (!existing) {
          groups.set(key, st);
          return;
        }

        const existingTime = existing.fetchedAt ? new Date(existing.fetchedAt).getTime() : 0;
        const currentTime = st.fetchedAt ? new Date(st.fetchedAt).getTime() : 0;
        if (currentTime > existingTime) {
          groups.set(key, st);
        }
      });

      return Array.from(groups.values());
    }

    function formatUpdated(fetchedAt) {
      if (!fetchedAt) return "";
      const d = new Date(fetchedAt);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function setStat(valueEl, stationEl, updatedEl, aqi, name, fetchedAt, faceEl) {
      const color = getAQIColor(aqi);
      valueEl.textContent = aqi ?? "N/A";
      valueEl.style.color = color;
      stationEl.textContent = name;
      stationEl.classList.remove("faded");
      const time = formatUpdated(fetchedAt);
      updatedEl.innerHTML = time ? CLOCK_ICON + `<span>${time}</span>` : "";
      updatedEl.classList.remove("faded");
      if (faceEl) faceEl.innerHTML = getAQIFaceSVG(aqi);
    }

    function setEmptyStat(valueEl, stationEl, updatedEl, faceEl) {
      valueEl.textContent = "--";
      valueEl.style.color = "";
      stationEl.textContent = "No data";
      stationEl.classList.add("faded");
      updatedEl.innerHTML = "";
      updatedEl.classList.add("faded");
      if (faceEl) faceEl.innerHTML = "";
    }

    async function loadWidget() {
      const card = document.getElementById("widgetCard");
      const refreshCaption = document.getElementById("refreshCaption");

      const cleanValue = document.getElementById("cleanValue");
      const cleanStation = document.getElementById("cleanStation");
      const cleanUpdated = document.getElementById("cleanUpdated");
      const cleanFace = document.getElementById("cleanFace");

      const highValue = document.getElementById("highValue");
      const highStation = document.getElementById("highStation");
      const highUpdated = document.getElementById("highUpdated");
      const highFace = document.getElementById("highFace");

      const onlineValue = document.getElementById("onlineValue");
      const onlineUpdated = document.getElementById("onlineUpdated");

      try {
        const res = await fetch("./aq_stations.json", { cache: "no-store" });
        const data = await res.json();

        const mapped = data.map(st => ({
          ...st,
          isStale: isStationStale(st)
        }));

        const active = dedupeStations(mapped).filter(st => !st.isStale);
        // Some stations report aqi: 0, which is a sensor/data error rather
        // than an actual "perfect air quality" reading — exclude those so
        // they don't wrongly win the "cleanest" spot.
        const withReadings = active.filter(
          st => st.aqi !== null && st.aqi !== undefined && st.aqi !== 0
        );

        card.classList.remove("is-loading");
        onlineValue.textContent = active.length;

        const now = new Date();
        refreshCaption.textContent = "As of " + now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit"
        });
        onlineUpdated.innerHTML = CLOCK_ICON + "<span>Refreshed just now</span>";

        if (withReadings.length === 0) {
          setEmptyStat(cleanValue, cleanStation, cleanUpdated, cleanFace);
          setEmptyStat(highValue, highStation, highUpdated, highFace);
          return;
        }

        const cleanest = withReadings.reduce((a, b) => (a.aqi <= b.aqi ? a : b));
        const highest = withReadings.reduce((a, b) => (a.aqi >= b.aqi ? a : b));

        setStat(cleanValue, cleanStation, cleanUpdated, cleanest.aqi, cleanest.name, cleanest.fetchedAt, cleanFace);
        setStat(highValue, highStation, highUpdated, highest.aqi, highest.name, highest.fetchedAt, highFace);
      } catch (err) {
        console.error("[Widget] Failed to load AQI data:", err);
        card.classList.remove("is-loading");
        setEmptyStat(cleanValue, cleanStation, cleanUpdated, cleanFace);
        setEmptyStat(highValue, highStation, highUpdated, highFace);
        onlineValue.textContent = "--";
        refreshCaption.textContent = "Failed to load";
      }
    }

    loadWidget();

    // Refresh every 10 minutes so an embedded widget doesn't go stale
    // while sitting on a page the visitor keeps open.
    setInterval(loadWidget, 10 * 60 * 1000);

    // --------------------------------------------------------
    // CURRENT-LOCATION WEATHER
    // Data: Open-Meteo (free, no key) for temperature / humidity /
    // wind / precipitation probability. Location name: BigDataCloud's
    // free client-side reverse geocoder (no key). Falls back to a
    // default city until the user opts in via "Use precise location",
    // which triggers the browser's geolocation permission prompt.
    // --------------------------------------------------------
    const DEFAULT_WEATHER_LOCATION = { lat: 6.9271, lon: 79.8612, name: "Colombo" };
    let weatherUnit = "C";
    let lastTempC = null;

    const WEATHER_ICONS = {
      0: "\u2600\uFE0F",   // clear sky
      1: "\uD83C\uDF24\uFE0F", // mainly clear
      2: "\u26C5",         // partly cloudy
      3: "\u2601\uFE0F",   // overcast
      45: "\uD83C\uDF2B\uFE0F", 48: "\uD83C\uDF2B\uFE0F", // fog
      51: "\uD83C\uDF26\uFE0F", 53: "\uD83C\uDF26\uFE0F", 55: "\uD83C\uDF26\uFE0F", // drizzle
      61: "\uD83C\uDF27\uFE0F", 63: "\uD83C\uDF27\uFE0F", 65: "\uD83C\uDF27\uFE0F", // rain
      66: "\uD83C\uDF27\uFE0F", 67: "\uD83C\uDF27\uFE0F",
      71: "\uD83C\uDF28\uFE0F", 73: "\uD83C\uDF28\uFE0F", 75: "\uD83C\uDF28\uFE0F", 77: "\uD83C\uDF28\uFE0F", // snow
      80: "\uD83C\uDF26\uFE0F", 81: "\uD83C\uDF26\uFE0F", 82: "\uD83C\uDF27\uFE0F", // showers
      85: "\uD83C\uDF28\uFE0F", 86: "\uD83C\uDF28\uFE0F", // snow showers
      95: "\u26C8\uFE0F", 96: "\u26C8\uFE0F", 99: "\u26C8\uFE0F" // thunderstorm
    };

    function getWeatherIcon(code) {
      return WEATHER_ICONS[code] || "\u26C5";
    }

    function renderTemp() {
      const tempEl = document.getElementById("weatherTemp");
      if (lastTempC === null) {
        tempEl.textContent = "--";
        return;
      }
      const value = weatherUnit === "C" ? lastTempC : (lastTempC * 9) / 5 + 32;
      tempEl.textContent = Math.round(value) + "\u00B0";
    }

    function setUnit(unit) {
      weatherUnit = unit;
      document.getElementById("unitC").classList.toggle("active", unit === "C");
      document.getElementById("unitF").classList.toggle("active", unit === "F");
      renderTemp();
    }

    async function reverseGeocodeLocation(lat, lon) {
      try {
        const res = await fetch(
          `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`
        );
        const data = await res.json();
        return data.city || data.locality || data.principalSubdivision || "Your area";
      } catch (err) {
        console.error("[Weather] Reverse geocoding failed:", err);
        return "Your area";
      }
    }

    async function fetchWeather(lat, lon) {
      const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m` +
        `&hourly=precipitation_probability&timezone=auto`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Weather fetch failed: " + res.status);
      return res.json();
    }

    async function loadWeatherFor(lat, lon, knownName) {
      const locationNameEl = document.getElementById("weatherLocationName");
      const iconEl = document.getElementById("weatherIcon");
      const humidityEl = document.getElementById("weatherHumidity");
      const windEl = document.getElementById("weatherWind");
      const precipEl = document.getElementById("weatherPrecip");

      locationNameEl.textContent = knownName || "Loading\u2026";

      try {
        const [weatherData, resolvedName] = await Promise.all([
          fetchWeather(lat, lon),
          knownName ? Promise.resolve(knownName) : reverseGeocodeLocation(lat, lon)
        ]);

        locationNameEl.textContent = resolvedName;

        const current = weatherData.current;
        lastTempC = current.temperature_2m;
        renderTemp();

        iconEl.textContent = getWeatherIcon(current.weather_code);
        humidityEl.textContent = Math.round(current.relative_humidity_2m);
        windEl.textContent = Math.round(current.wind_speed_10m);

        // Match the current hour against the hourly precipitation
        // probability series to show a "right now" percentage.
        let precipValue = "--";
        if (weatherData.hourly && weatherData.hourly.time) {
          const idx = weatherData.hourly.time.indexOf(current.time);
          if (idx !== -1) {
            precipValue = weatherData.hourly.precipitation_probability[idx];
          }
        }
        precipEl.textContent = precipValue;
      } catch (err) {
        console.error("[Weather] Failed to load weather:", err);
        locationNameEl.textContent = resolvedNameFallback(knownName);
      }
    }

    function resolvedNameFallback(knownName) {
      return knownName || "Unavailable";
    }

    function usePreciseLocation() {
      const btn = document.getElementById("preciseLocationBtn");
      if (!navigator.geolocation) {
        alert("Precise location isn't supported in this browser.");
        return;
      }
      btn.disabled = true;
      const originalTitle = btn.title;
      btn.title = "Locating\u2026";

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          await loadWeatherFor(latitude, longitude);
          btn.disabled = false;
          btn.title = originalTitle;
        },
        (err) => {
          console.error("[Weather] Geolocation denied/failed:", err);
          btn.disabled = false;
          btn.title = originalTitle;

          const locationNameEl = document.getElementById("weatherLocationName");
          // code 1 = PERMISSION_DENIED. When this widget is embedded in a
          // cross-origin iframe (e.g. on cleanair.lk), browsers block
          // geolocation by default unless the embedding page's <iframe>
          // tag includes allow="geolocation" — in that case the browser
          // never even shows a permission prompt, it just rejects
          // instantly, which otherwise looks like the button "does
          // nothing." Surface that here instead of failing silently.
          const message = err.code === 1
            ? "Location blocked by this page"
            : "Location unavailable";
          locationNameEl.textContent = message;
          setTimeout(() => {
            // Restore whatever location name was showing before, once
            // the user has had a chance to see the message.
            if (locationNameEl.textContent === message) {
              locationNameEl.textContent = DEFAULT_WEATHER_LOCATION.name;
            }
          }, 4000);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    document.getElementById("unitC").addEventListener("click", () => setUnit("C"));
    document.getElementById("unitF").addEventListener("click", () => setUnit("F"));

    // The whole card is an <a href="dashboard.html">, so stop this
    // button from also triggering navigation when clicked.
    document.getElementById("preciseLocationBtn").addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      usePreciseLocation();
    });

    // Initial load uses the default location; the user can upgrade to
    // GPS precision any time via the button above.
    loadWeatherFor(DEFAULT_WEATHER_LOCATION.lat, DEFAULT_WEATHER_LOCATION.lon, DEFAULT_WEATHER_LOCATION.name);
  </script>

</body>
</html>
