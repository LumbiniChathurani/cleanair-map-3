<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sri Lanka Air Quality Widget</title>
  <style>
    :root {
      --ink: #101F26;
      --muted: #5C6E75;
      --faint: #9AA8AE;
      --hairline: #E1E7EA;
      --card-bg: #F1F5F9;
      --card-bg-alt: #F1F5F9;
      --box-bg: #FFFFFF;
      --brand: #17677F;
      --brand-soft: #E4EEF1;
      --brand-hover: #114F62;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .widget-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
      height: 100%;
      min-height: 180px;
      padding: 18px 22px 16px;
      background: linear-gradient(178deg, var(--card-bg) 0%, var(--card-bg-alt) 100%);
      border: 1px solid var(--hairline);
      border-radius: 16px;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.05), 0 8px 24px rgba(16, 31, 38, 0.07);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .widget-card::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(
        to right,
        #009966, #ffde33, #ff9933, #cc0033, #660099
      );
      opacity: 0.9;
    }

    .widget-card:hover {
      box-shadow: 0 3px 8px rgba(16, 31, 38, 0.08), 0 16px 34px rgba(16, 31, 38, 0.12);
      transform: translateY(-1px);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .brand-icon {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 11px;
      height: 11px;
    }

    .eyebrow {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      white-space: nowrap;
    }
    .eyebrow1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      white-space: nowrap;
    }
    .live-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand);
      margin-left: 6px;
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--brand);
      flex-shrink: 0;
    }

    @media (prefers-reduced-motion: no-preference) {
      .live-dot {
        animation: pulse 2.4s ease-in-out infinite;
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-caption {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--faint);
      white-space: nowrap;
    }

    /* --------------------------------------------------------
       STATS GRID — each stat is now its own lighter (white)
       box sitting on the slightly darker card background, so
       the three readings read as distinct panels.
       -------------------------------------------------------- */
    .stats-grid {
      display: flex;
      align-items: stretch;
      gap: 10px;
    }

    .stat-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
      padding: 12px 14px;
      background: var(--box-bg);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(16, 31, 38, 0.04);
    }

    .stat-label-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      opacity: 0.85;
    }

    .stat-label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--ink);
      white-space: nowrap;
    }

    .stat-value-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .stat-unit {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--faint);
      text-transform: uppercase;
    }

    .stat-station {
      font-size: 13px;
      font-weight: 650;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-updated {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-updated svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .stat-station.faded,
    .stat-updated.faded {
      color: var(--faint);
      font-weight: 500;
    }

    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      /*border-top: 1px solid var(--hairline);*/
      padding-top: 5px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--brand);
      white-space: nowrap;
    }

    .cta-arrow {
      transition: transform 0.18s ease;
      display: flex;
      align-items: center;
    }

    .widget-card:hover .cta-arrow {
      transform: translateX(3px);
    }

    .widget-card:hover .cta-button {
      color: var(--brand-hover);
    }

    .widget-card.is-loading .stat-value {
      color: var(--faint);
    }

    @media (max-width: 380px) {
      .stats-grid {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <a id="widgetCard" class="widget-card is-loading" href="dashboard.html" target="_top">

    <div class="header-row">
      <div class="brand-mark">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13c0-5 4-9 9-9s9 4 9 9" stroke="#17677F" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 13c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#17677F" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
            <circle cx="12" cy="13" r="1.6" fill="#17677F"/>
          </svg>
        </span>
        <span class="eyebrow">Sri Lanka Air Quality<span class="live-tag"><span class="live-dot"></span>Live</span></span><br/>
        
      </div>
      <span id="refreshCaption" class="refresh-caption"></span>
    </div>
    <div>
        <span class="eyebrow1">How clean is the air today?</span>
    </div>

    <div class="stats-grid">
      <div class="stat-block">
        <div class="stat-label-row">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 16L9 10L13 14L20 6" stroke="#009966" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 6H15M20 6V11" stroke="#009966" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="stat-label">Cleanest</span>
        </div>
        <div class="stat-value-row">
          <span id="cleanValue" class="stat-value">&ndash;&ndash;</span>
          <span class="stat-unit">AQI</span>
        </div>
        <span id="cleanStation" class="stat-station faded">Loading&hellip;</span>
        <span id="cleanUpdated" class="stat-updated"></span>
      </div>

      <div class="stat-block">
        <div class="stat-label-row">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 8L9 14L13 10L20 18" stroke="#cc0033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 13V18H15" stroke="#cc0033" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="stat-label">Highest</span>
        </div>
        <div class="stat-value-row">
          <span id="highValue" class="stat-value">&ndash;&ndash;</span>
          <span class="stat-unit">AQI</span>
        </div>
        <span id="highStation" class="stat-station faded">Loading&hellip;</span>
        <span id="highUpdated" class="stat-updated"></span>
      </div>

      <div class="stat-block">
        <div class="stat-label-row">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="8.5" stroke="#17677F" stroke-width="2.2"/>
            <path d="M9 12.3L11 14.3L15.5 9.7" stroke="#17677F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="stat-label">Online</span>
        </div>
        <div class="stat-value-row">
          <span id="onlineValue" class="stat-value">&ndash;&ndash;</span>
        </div>
        <span class="stat-station">Stations reporting</span>
        <span id="onlineUpdated" class="stat-updated"></span>
      </div>
    </div>

    <div class="bottom-row">
      <span class="cta-button">
        View full dashboard
        <span class="cta-arrow">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </span>
    </div>
  </a>

  <script>
    const STALE_THRESHOLD_HOURS = 24; // matches dashboard.html

    const CLOCK_ICON = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
      <path d="M12 7V12L15.5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    function getAQIColor(aqi) {
      if (aqi === null || aqi === undefined) return "#9AA8AE";
      if (aqi <= 50) return "#009966";
      if (aqi <= 100) return "#ffde33";
      if (aqi <= 150) return "#ff9933";
      if (aqi <= 200) return "#cc0033";
      if (aqi <= 300) return "#660099";
      return "#7e0023";
    }

    function isStationStale(st) {
      if (st.aqi === null || st.aqi === undefined) return true;
      if (!st.fetchedAt) return true;
      const fetchedTime = new Date(st.fetchedAt);
      if (isNaN(fetchedTime.getTime())) return true;
      const ageHours = (Date.now() - fetchedTime.getTime()) / (1000 * 60 * 60);
      return ageHours > STALE_THRESHOLD_HOURS;
    }

    // Same dedup logic as dashboard.html — collapses duplicate entries
    // for the same physical station (identical name+coords, different
    // fetchedAt) down to just the freshest reading, so the "online"
    // count here matches what the dashboard reports.
    function dedupeStations(stations) {
      const groups = new Map();

      stations.forEach(st => {
        const hasCoords = st.lat !== undefined && st.lon !== undefined;
        const key = hasCoords
          ? `${st.name}_${st.lat.toFixed(3)}_${st.lon.toFixed(3)}`
          : (st.stationId || `${st.name}_${st.source}`);

        const existing = groups.get(key);
        if (!existing) {
          groups.set(key, st);
          return;
        }

        const existingTime = existing.fetchedAt ? new Date(existing.fetchedAt).getTime() : 0;
        const currentTime = st.fetchedAt ? new Date(st.fetchedAt).getTime() : 0;
        if (currentTime > existingTime) {
          groups.set(key, st);
        }
      });

      return Array.from(groups.values());
    }

    function formatUpdated(fetchedAt) {
      if (!fetchedAt) return "";
      const d = new Date(fetchedAt);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function setStat(valueEl, stationEl, updatedEl, aqi, name, fetchedAt) {
      const color = getAQIColor(aqi);
      valueEl.textContent = aqi ?? "N/A";
      valueEl.style.color = color;
      stationEl.textContent = name;
      stationEl.classList.remove("faded");
      const time = formatUpdated(fetchedAt);
      updatedEl.innerHTML = time ? CLOCK_ICON + `<span>${time}</span>` : "";
      updatedEl.classList.remove("faded");
    }

    function setEmptyStat(valueEl, stationEl, updatedEl) {
      valueEl.textContent = "--";
      valueEl.style.color = "";
      stationEl.textContent = "No data";
      stationEl.classList.add("faded");
      updatedEl.innerHTML = "";
      updatedEl.classList.add("faded");
    }

    async function loadWidget() {
      const card = document.getElementById("widgetCard");
      const refreshCaption = document.getElementById("refreshCaption");

      const cleanValue = document.getElementById("cleanValue");
      const cleanStation = document.getElementById("cleanStation");
      const cleanUpdated = document.getElementById("cleanUpdated");

      const highValue = document.getElementById("highValue");
      const highStation = document.getElementById("highStation");
      const highUpdated = document.getElementById("highUpdated");

      const onlineValue = document.getElementById("onlineValue");
      const onlineUpdated = document.getElementById("onlineUpdated");

      try {
        const res = await fetch("./aq_stations.json", { cache: "no-store" });
        const data = await res.json();

        const mapped = data.map(st => ({
          ...st,
          isStale: isStationStale(st)
        }));

        const active = dedupeStations(mapped).filter(st => !st.isStale);
        // Some stations report aqi: 0, which is a sensor/data error rather
        // than an actual "perfect air quality" reading — exclude those so
        // they don't wrongly win the "cleanest" spot.
        const withReadings = active.filter(
          st => st.aqi !== null && st.aqi !== undefined && st.aqi !== 0
        );

        card.classList.remove("is-loading");
        onlineValue.textContent = active.length;

        const now = new Date();
        refreshCaption.textContent = "As of " + now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit"
        });
        onlineUpdated.innerHTML = CLOCK_ICON + "<span>Refreshed just now</span>";

        if (withReadings.length === 0) {
          setEmptyStat(cleanValue, cleanStation, cleanUpdated);
          setEmptyStat(highValue, highStation, highUpdated);
          return;
        }

        const cleanest = withReadings.reduce((a, b) => (a.aqi <= b.aqi ? a : b));
        const highest = withReadings.reduce((a, b) => (a.aqi >= b.aqi ? a : b));

        setStat(cleanValue, cleanStation, cleanUpdated, cleanest.aqi, cleanest.name, cleanest.fetchedAt);
        setStat(highValue, highStation, highUpdated, highest.aqi, highest.name, highest.fetchedAt);
      } catch (err) {
        console.error("[Widget] Failed to load AQI data:", err);
        card.classList.remove("is-loading");
        setEmptyStat(cleanValue, cleanStation, cleanUpdated);
        setEmptyStat(highValue, highStation, highUpdated);
        onlineValue.textContent = "--";
        refreshCaption.textContent = "Failed to load";
      }
    }

    loadWidget();

    // Refresh every 10 minutes so an embedded widget doesn't go stale
    // while sitting on a page the visitor keeps open.
    setInterval(loadWidget, 10 * 60 * 1000);
  </script>

</body>
</html>
